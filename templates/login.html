<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neil's Brain — Login</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;
      background:#111111;
      color:#F0ECE6;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      background:#1A1A1A;
      border:1px solid #2A2A2A;
      border-radius:10px;
      padding:32px 28px;
      width:100%;
      max-width:360px;
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:'';
      position:absolute;
      top:0;left:0;right:0;
      height:3px;
      background:linear-gradient(90deg,#E02424,transparent);
    }
    .logo{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:8px;
    }
    .logo-bar{width:4px;height:20px;background:#E02424;border-radius:1px;}
    .logo-text{font-size:15px;font-weight:500;letter-spacing:0.05em;}
    .subtitle{color:#B8B4AE;font-size:12px;margin-bottom:24px;}
    .form-label{
      font-size:10px;
      text-transform:uppercase;
      letter-spacing:0.1em;
      color:#E02424;
      margin-bottom:6px;
      display:block;
      font-weight:500;
    }
    input[type="password"]{
      width:100%;
      background:#242424;
      border:1px solid #2E2E2E;
      border-radius:5px;
      padding:10px 12px;
      color:#F0ECE6;
      font-size:13px;
      font-family:inherit;
      outline:none;
      transition:border-color 0.15s;
    }
    input[type="password"]:focus{border-color:#E02424;}
    button{
      width:100%;
      margin-top:16px;
      background:#E02424;
      color:#F0ECE6;
      border:none;
      border-radius:5px;
      padding:10px;
      font-size:13px;
      font-weight:500;
      cursor:pointer;
      font-family:inherit;
      letter-spacing:0.03em;
      transition:background 0.15s;
    }
    button:hover{background:#CC1C1C;}
    .error{
      background:#3A1010;
      border:1px solid #4A0A0A;
      color:#FF8080;
      font-size:12px;
      padding:8px 10px;
      border-radius:5px;
      margin-bottom:14px;
    }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <div class="logo">
      <div class="logo-bar"></div>
      <div class="logo-text">NEIL'S BRAIN</div>
    </div>
    <div class="subtitle">Enter token to access the dashboard</div>

    {{ error_block }}

    <label class="form-label" for="token">Access token</label>
    <input type="password" id="token" name="token" autofocus autocomplete="off" />
    <button type="submit">Unlock</button>
  </form>
</body>
</html>
