
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neil's Brain</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --blk:#111111;--blk2:#1A1A1A;--blk3:#242424;--blk4:#2E2E2E;
      --red:#CC1C1C;--red2:#E02424;--red3:#FF2E2E;--red-dim:#4A0A0A;
      --silver:#C4C6C8;--chrome:#D8DADB;
      --white:#F0ECE6;--white2:#D4D0CA;--white3:#B8B4AE;
      --score-gold:#F0A020;
    }
    html,body{height:100%;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,sans-serif;
      background:var(--blk);
      color:var(--white);
      overflow:hidden;
    }
    .dash{display:flex;height:100vh;}

    /* Sidebar */
    .sidebar{width:190px;background:var(--blk);border-right:1px solid #2A2A2A;display:flex;flex-direction:column;flex-shrink:0;}
    .sidebar-head{padding:18px 16px 14px;border-bottom:1px solid #2A2A2A;}
    .logo{font-size:13px;font-weight:500;color:var(--white);display:flex;align-items:center;gap:9px;letter-spacing:0.03em;}
    .logo-bar{width:3px;height:16px;background:var(--red2);border-radius:1px;}
    .sidebar-section{padding:10px 8px;}
    .sidebar-label{font-size:9px;font-weight:500;color:var(--white3);text-transform:uppercase;letter-spacing:0.1em;padding:0 8px;margin-bottom:5px;}
    .nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--white3);transition:all 0.1s;}
    .nav-item:hover{background:var(--blk3);color:var(--white);}
    .nav-item.active{background:var(--blk4);color:var(--white);border-left:2px solid var(--red2);padding-left:8px;}
    .nav-badge{margin-left:auto;font-size:9px;background:#1E1E1E;color:var(--silver);padding:1px 6px;border-radius:10px;}
    .sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid #222;font-size:10px;color:var(--white3);display:flex;justify-content:space-between;align-items:center;}
    .logout-link{color:var(--white3);text-decoration:none;font-size:10px;}
    .logout-link:hover{color:var(--red2);}

    /* Main panel */
    .main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--blk2);}
    .topbar{padding:0 18px;border-bottom:1px solid #2A2A2A;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--blk);height:46px;}
    .topbar-title{font-size:14px;font-weight:500;}
    .tab-row{display:flex;gap:2px;height:100%;}
    .tab{font-size:11px;color:var(--white3);padding:0 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.1s;display:flex;align-items:center;letter-spacing:0.03em;}
    .tab:hover{color:var(--white);}
    .tab.active{color:var(--red2);border-bottom-color:var(--red2);}

    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;border-bottom:1px solid #2A2A2A;flex-shrink:0;background:#222;}
    .stat-card{background:var(--blk2);padding:12px 16px;}
    .stat-label{font-size:10px;color:var(--white3);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em;}
    .stat-value{font-size:20px;font-weight:500;color:var(--white);}
    .stat-value.red{color:var(--red2);}
    .stat-value.gold{color:var(--score-gold);}
    .stat-sub{font-size:10px;color:var(--white3);margin-top:2px;}

    .content{flex:1;display:flex;overflow:hidden;}

    /* Ideas list */
    .ideas-list{width:340px;border-right:1px solid #2A2A2A;overflow-y:auto;flex-shrink:0;}
    .idea-item{padding:12px 14px;border-bottom:1px solid #202020;cursor:pointer;transition:background 0.1s;}
    .idea-item:hover{background:var(--blk3);}
    .idea-item.selected{background:var(--blk3);border-left:2px solid var(--red2);padding-left:12px;}
    .idea-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px;}
    .idea-title{font-size:12px;font-weight:500;color:var(--white);line-height:1.4;flex:1;}
    .score-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:10px;flex-shrink:0;}
    .score-high{background:#3A1800;color:var(--score-gold);}
    .score-mid{background:#1A2B10;color:#7EC040;}
    .score-low{background:#282828;color:var(--silver);}
    .idea-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
    .stage-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:0.03em;}
    .stage-raw{background:#252525;color:var(--silver);}
    .stage-refined{background:#0D1E33;color:#5BA0D8;}
    .stage-validated{background:#0A2010;color:#60C060;}
    .stage-build{background:#1A0A2A;color:#9A80E0;}
    .tag{font-size:9px;color:var(--white3);background:#1E1E1E;padding:2px 5px;border-radius:3px;}
    .idea-snippet{font-size:11px;color:var(--white3);margin-top:5px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

    /* Detail pane */
    .detail-pane{flex:1;overflow-y:auto;padding:18px;min-width:0;background:var(--blk2);}
    .detail-title{font-size:15px;font-weight:500;color:var(--white);line-height:1.4;margin-bottom:8px;}
    .detail-summary{font-size:12px;color:var(--white3);margin-bottom:12px;line-height:1.6;}
    .detail-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px;}
    .section-label{font-size:9px;font-weight:500;color:var(--red2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;border-bottom:1px solid var(--red-dim);padding-bottom:4px;}
    .detail-section{margin-bottom:16px;}

    .score-bars{display:flex;flex-direction:column;gap:7px;}
    .score-row{display:flex;align-items:center;gap:10px;}
    .score-row-label{font-size:11px;color:var(--white3);width:80px;flex-shrink:0;}
    .score-bar-track{flex:1;height:4px;background:#2A2A2A;border-radius:20px;overflow:hidden;}
    .score-bar-fill{height:100%;border-radius:20px;transition:width 0.4s;}
    .bar-density{background:var(--score-gold);}
    .bar-revenue{background:#4CAF50;}
    .bar-effort{background:#4A90E0;}
    .bar-novelty{background:#9B80E0;}
    .score-row-val{font-size:10px;color:var(--silver);width:26px;text-align:right;flex-shrink:0;}

    .entries-list{display:flex;flex-direction:column;gap:6px;}
    .entry-item{font-size:12px;color:var(--white2);background:var(--blk3);border-radius:5px;padding:9px 11px;line-height:1.6;border-left:2px solid var(--blk4);}
    .entry-date{font-size:9px;color:var(--white3);margin-top:4px;letter-spacing:0.03em;}

    .links-list{display:flex;flex-direction:column;gap:6px;}
    .link-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:8px 10px;background:var(--blk3);border-radius:5px;cursor:pointer;border:1px solid #2A2A2A;transition:border-color 0.1s;}
    .link-item:hover{border-color:var(--red-dim);}
    .link-info{flex:1;min-width:0;}
    .link-name{color:var(--white);font-weight:500;margin-bottom:2px;}
    .link-reason{font-size:10px;color:var(--white3);line-height:1.4;}
    .link-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:10px;}
    .link-strength{font-size:9px;color:var(--white3);background:#1E1E1E;padding:2px 6px;border-radius:10px;}
    .link-arrow{color:var(--red2);font-size:12px;}

    /* Empty / loading states */
    .empty-detail,.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--white3);font-size:12px;text-align:center;padding:20px;}
    .empty-section{font-size:11px;color:var(--white3);padding:8px 10px;background:var(--blk3);border-radius:5px;font-style:italic;}

    /* Connections view */
    .connections-grid{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;overflow-y:auto;align-content:start;width:100%;}
    .conn-card{background:var(--blk3);border:1px solid #2C2C2C;border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
    .conn-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red2),transparent);}
    .conn-card:hover{border-color:#3A3A3A;background:var(--blk4);}
    .conn-name{font-size:12px;font-weight:500;color:var(--white);margin-bottom:6px;line-height:1.3;}
    .conn-summary{font-size:10px;color:var(--white3);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .conn-meta{display:flex;align-items:center;gap:6px;}
    .conn-stat{display:flex;flex-direction:column;align-items:center;background:var(--blk2);border-radius:5px;padding:5px 8px;flex:1;}
    .conn-stat-val{font-size:14px;font-weight:500;color:var(--white);}
    .conn-stat-val.gold{color:var(--score-gold);}
    .conn-stat-val.red{color:var(--red2);}
    .conn-stat-label{font-size:8px;color:var(--white3);text-transform:uppercase;letter-spacing:0.06em;margin-top:2px;}

    /* Scrollbar */
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:var(--blk);}
    ::-webkit-scrollbar-thumb{background:var(--blk4);border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:#3A3A3A;}
  </style>
</head>
<body>
<div class="dash">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="logo"><div class="logo-bar"></div>NEIL'S BRAIN</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <div class="nav-item active" data-view="all">◈ All Ideas <span class="nav-badge" id="navCount">—</span></div>
      <div class="nav-item" data-view="connections">◎ Connections</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Quick filters</div>
      <div class="nav-item" data-filter="top">★ Top Scored</div>
      <div class="nav-item" data-filter="revenue">⊕ Revenue Fit</div>
      <div class="nav-item" data-filter="build">✓ Build Pipeline</div>
      <div class="nav-item" data-filter="all">↺ Clear filter</div>
    </div>
    <div class="sidebar-footer">
      <span id="footerInfo">v0.1</span>
      <a href="/logout" class="logout-link">Logout</a>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="mainTitle">All Ideas</div>
      <div class="tab-row">
        <div class="tab active" data-tab="list">List</div>
        <div class="tab" data-tab="connections">Connections</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total ideas</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub" id="statTotalSub">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Entries</div><div class="stat-value" id="statEntries">—</div><div class="stat-sub" id="statEntriesSub">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Top score</div><div class="stat-value gold" id="statTop">—</div><div class="stat-sub" id="statTopSub">&nbsp;</div></div>
      <div class="stat-card"><div class="stat-label">Build pipeline</div><div class="stat-value red" id="statBuild">—</div><div class="stat-sub">ready to act on</div></div>
    </div>

    <div class="content" id="listView">
      <div class="ideas-list" id="ideaList"><div class="loading">Loading ideas…</div></div>
      <div class="detail-pane" id="detailPane"><div class="empty-detail">Select an idea to view detail</div></div>
    </div>

    <div class="content" id="connectionsView" style="display:none;">
      <div class="connections-grid" id="connectionsGrid"><div class="loading">Loading connections…</div></div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
const state = {
  ideas: [],
  filtered: [],
  selectedId: null,
  filter: "all",
};

const stageLabel = {raw:"Raw",refined:"Refined",validated:"Validated",build:"Build"};
const stageCls   = {raw:"stage-raw",refined:"stage-refined",validated:"stage-validated",build:"stage-build"};

function scoreClass(s){ return s >= 75 ? "score-high" : s >= 60 ? "score-mid" : "score-low"; }

function escapeHtml(s){
  if (s == null) return "";
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function formatDate(iso){
  if (!iso) return "";
  try {
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("en-GB", {day:"numeric", month:"short", year:"numeric"}) +
           " · " + d.toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit"});
  } catch { return iso; }
}

// ─── API ────────────────────────────────────────────────────────────────────
async function apiGet(path){
  const r = await fetch(path, {credentials:"same-origin"});
  if (r.status === 401) { window.location = "/login"; return null; }
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}

// ─── Rendering: stats ───────────────────────────────────────────────────────
function renderStats(s){
  document.getElementById("statTotal").textContent    = s.total_clusters;
  document.getElementById("statTotalSub").textContent = s.high_density_clusters + " high density";
  document.getElementById("statEntries").textContent  = s.total_entries;
  document.getElementById("statEntriesSub").textContent = "+" + s.new_this_week + " this week";
  document.getElementById("statTop").textContent      = s.top_score;
  document.getElementById("statTopSub").textContent   = s.top_score_name;
  document.getElementById("statBuild").textContent    = s.build_count;
  document.getElementById("navCount").textContent     = s.total_clusters;
}

// ─── Rendering: idea list ──────────────────────────────────────────────────
function applyFilter(){
  const f = state.filter;
  if (f === "all") state.filtered = state.ideas;
  else if (f === "top") state.filtered = state.ideas.filter(i => i.score >= 70);
  else if (f === "revenue") state.filtered = [...state.ideas].sort((a,b) => b.scores.revenue_fit - a.scores.revenue_fit);
  else if (f === "build") state.filtered = state.ideas.filter(i => i.stage === "build");
  else state.filtered = state.ideas;
}

function renderList(){
  const el = document.getElementById("ideaList");
  if (!state.filtered.length){
    el.innerHTML = '<div class="loading">No ideas match this filter.</div>';
    return;
  }
  el.innerHTML = state.filtered.map(i => `
    <div class="idea-item ${i.id === state.selectedId ? 'selected' : ''}" data-id="${i.id}">
      <div class="idea-top">
        <div class="idea-title">${escapeHtml(i.name)}</div>
        <div class="score-pill ${scoreClass(i.score)}">${i.score}</div>
      </div>
      <div class="idea-meta">
        <span class="stage-badge ${stageCls[i.stage]}">${stageLabel[i.stage]}</span>
        ${(i.tags || []).slice(0,3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}
      </div>
      <div class="idea-snippet">${escapeHtml(i.summary || "")}</div>
    </div>
  `).join("");

  el.querySelectorAll(".idea-item").forEach(node => {
    node.addEventListener("click", () => selectIdea(parseInt(node.dataset.id, 10)));
  });
}

// ─── Rendering: detail pane ────────────────────────────────────────────────
async function selectIdea(id){
  state.selectedId = id;
  renderList();
  const pane = document.getElementById("detailPane");
  pane.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const d = await apiGet(`/api/clusters/${id}`);
    if (!d) return;
    renderDetail(d);
  } catch (e) {
    pane.innerHTML = `<div class="empty-detail">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

function renderDetail(d){
  const pane = document.getElementById("detailPane");
  const s = d.scores;
  pane.innerHTML = `
    <div class="detail-title">${escapeHtml(d.name)}</div>
    <div class="detail-summary">${escapeHtml(d.summary || "")}</div>
    <div class="detail-badges">
      <span class="stage-badge ${stageCls[d.stage]}">${stageLabel[d.stage]}</span>
      ${(d.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}
      <span class="score-pill ${scoreClass(s.total)}" style="font-size:10px;">Score: ${s.total}</span>
    </div>

    <div class="detail-section">
      <div class="section-label">Score breakdown</div>
      <div class="score-bars">
        <div class="score-row"><div class="score-row-label">Idea density</div><div class="score-bar-track"><div class="score-bar-fill bar-density" style="width:${s.density}%"></div></div><div class="score-row-val">${s.density}</div></div>
        <div class="score-row"><div class="score-row-label">Revenue fit</div><div class="score-bar-track"><div class="score-bar-fill bar-revenue" style="width:${s.revenue_fit}%"></div></div><div class="score-row-val">${s.revenue_fit}</div></div>
        <div class="score-row"><div class="score-row-label">Effort</div><div class="score-bar-track"><div class="score-bar-fill bar-effort" style="width:${s.effort}%"></div></div><div class="score-row-val">${s.effort}</div></div>
        <div class="score-row"><div class="score-row-label">Novelty</div><div class="score-bar-track"><div class="score-bar-fill bar-novelty" style="width:${s.novelty}%"></div></div><div class="score-row-val">${s.novelty}</div></div>
      </div>
    </div>

    <div class="detail-section">
      <div class="section-label">Entries (${d.entries.length})</div>
      ${d.entries.length
        ? `<div class="entries-list">${d.entries.map(e => `
            <div class="entry-item">${escapeHtml(e.text)}<div class="entry-date">${formatDate(e.created_at)}</div></div>
          `).join("")}</div>`
        : `<div class="empty-section">No entries yet.</div>`}
    </div>

    <div class="detail-section">
      <div class="section-label">Linked clusters</div>
      ${d.links.length
        ? `<div class="links-list">${d.links.map(l => `
            <div class="link-item" data-id="${l.cluster_id}">
              <div class="link-info">
                <div class="link-name">${escapeHtml(l.name)}</div>
                <div class="link-reason">${escapeHtml(l.reason || "No reason recorded")}</div>
              </div>
              <div class="link-right">
                <span class="link-strength">×${l.strength}</span>
                <span class="link-arrow">→</span>
              </div>
            </div>`).join("")}</div>`
        : `<div class="empty-section">No linked clusters yet.</div>`}
    </div>
  `;

  pane.querySelectorAll(".link-item").forEach(n => {
    n.addEventListener("click", () => {
      switchTab("list");
      selectIdea(parseInt(n.dataset.id, 10));
    });
  });
}

// ─── Rendering: connections view ───────────────────────────────────────────
async function renderConnections(){
  const el = document.getElementById("connectionsGrid");
  el.innerHTML = '<div class="loading">Loading connections…</div>';

  if (!state.ideas.length){
    el.innerHTML = '<div class="loading">No ideas to show.</div>';
    return;
  }

  el.innerHTML = state.ideas.map(i => `
    <div class="conn-card" data-id="${i.id}">
      <div class="conn-name">${escapeHtml(i.name)}</div>
      <div class="conn-summary">${escapeHtml(i.summary || "")}</div>
      <div class="conn-meta">
        <div class="conn-stat"><div class="conn-stat-val">${i.entry_count}</div><div class="conn-stat-label">entries</div></div>
        <div class="conn-stat"><div class="conn-stat-val gold">${i.score}</div><div class="conn-stat-label">score</div></div>
        <div class="conn-stat"><div class="conn-stat-val red">${i.scores.density}</div><div class="conn-stat-label">density</div></div>
      </div>
    </div>
  `).join("");

  el.querySelectorAll(".conn-card").forEach(n => {
    n.addEventListener("click", () => {
      switchTab("list");
      selectIdea(parseInt(n.dataset.id, 10));
    });
  });
}

// ─── Tab switching ─────────────────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  document.getElementById("listView").style.display        = tab === "list" ? "flex" : "none";
  document.getElementById("connectionsView").style.display = tab === "connections" ? "flex" : "none";
  document.getElementById("mainTitle").textContent         = tab === "connections" ? "Connections" : "All Ideas";
  if (tab === "connections") renderConnections();
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => switchTab(t.dataset.tab));
});

// ─── Filter buttons ────────────────────────────────────────────────────────
document.querySelectorAll(".nav-item[data-filter]").forEach(n => {
  n.addEventListener("click", () => {
    state.filter = n.dataset.filter;
    applyFilter();
    renderList();
  });
});

// ─── Boot ──────────────────────────────────────────────────────────────────
async function boot(){
  try {
    const [stats, ideas] = await Promise.all([
      apiGet("/api/stats"),
      apiGet("/api/clusters"),
    ]);
    if (!stats || !ideas) return;
    renderStats(stats);
    state.ideas = ideas;
    applyFilter();
    renderList();
    if (ideas.length) selectIdea(ideas[0].id);
    else document.getElementById("detailPane").innerHTML =
         '<div class="empty-detail">No ideas captured yet — send one to the bot to get started.</div>';
  } catch (e) {
    document.getElementById("ideaList").innerHTML =
      `<div class="loading">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

boot();
</script>
</body>
</html>
